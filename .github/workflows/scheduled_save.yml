name: Scheduled NAV Data Save

on:
  schedule:
    # 北京时间 15:00 = UTC 07:00 (收盘保存)
    - cron: '0 7 * * 1-5'
    # 北京时间 05:00 = UTC 21:00 (次日保存)
    - cron: '0 21 * * 0-4'
  workflow_dispatch:  # 允许手动触发

jobs:
  save-close-data:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * 1-5'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run close data save
        run: |
          cd web
          python nav_scheduler.py close
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto save: Close data $(date '+%Y-%m-%d %H:%M')"
          git push

  save-next-day-data:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 21 * * 0-4'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run next day data save
        run: |
          cd web
          python nav_scheduler.py next_day
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto save: Next day data $(date '+%Y-%m-%d %H:%M')"
          git push
